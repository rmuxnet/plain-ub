<!DOCTYPE html>
<html lang="en" class="bg-black">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UB WebUI Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { black: '#000000', offblack: '#0a0a0a', terminal: '#cccccc', dim: '#666666', border: '#171717' },
                    fontFamily: { mono: ['Courier New', 'Courier', 'monospace'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body class="bg-black text-terminal font-mono antialiased min-h-screen p-4 md:p-8">

    <div id="login-container" class="max-w-md mx-auto mt-32 border border-border bg-offblack p-8 text-center hidden">
        <h2 class="text-white text-lg font-bold mb-4">WebUI Authentication</h2>
        <form id="totp-form" class="flex flex-col gap-4">
            <input type="text" id="totp-code" maxlength="6"
                class="bg-black border border-border text-white text-center font-mono py-3 tracking-widest text-xl focus:border-dim focus:outline-none transition-colors placeholder-dim/30"
                placeholder="000000" autocomplete="off" required>
            <button type="submit"
                class="border border-border bg-black text-dim hover:text-white hover:border-white text-xs font-bold py-3 transition-colors uppercase tracking-widest">Authenticate</button>
        </form>
        <div id="login-error" class="text-red-900 border-l border-red-900 text-xs mt-4 pl-2 text-left font-bold hidden">
            Invalid TOTP Code / Unauthorized.</div>
    </div>

    <!-- MAIN APP STRUCTURE -->
    <div id="dashboard-content" class="max-w-7xl mx-auto hidden">

        <header
            class="mb-12 border-b border-border pb-6 flex flex-col md:flex-row md:justify-between md:items-end gap-4">
            <div>
                <h1 class="text-3xl font-bold tracking-tighter text-white">UB_CORE WebUI</h1>
                <p class="text-dim text-xs uppercase tracking-widest mt-1">Status: <span
                        class="text-green-500 animate-pulse">ONLINE</span></p>
            </div>
            <button onclick="logout()"
                class="text-xs text-dim hover:text-white transition uppercase tracking-widest border border-border px-4 py-2 bg-offblack">>
                SYSTEM_LOGOUT</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8 mb-12">
            <!-- SYS STATS -->
            <div class="border border-border bg-offblack p-6 hover:border-dim transition-colors group">
                <h2
                    class="text-white text-xs font-bold mb-4 border-l-2 border-dim pl-2 uppercase tracking-widest group-hover:border-white transition-colors">
                    Host Telemetry</h2>
                <div class="space-y-4 text-xs font-mono">
                    <div class="flex justify-between items-center"><span class="text-dim">CPU</span><span id="sys-cpu"
                            class="text-white font-bold">0.0%</span></div>
                    <div class="flex justify-between items-center"><span class="text-dim">RAM</span><span id="sys-ram"
                            class="text-white font-bold">0.0%</span></div>
                    <div class="flex justify-between items-center"><span class="text-dim">DISK</span><span id="sys-disk"
                            class="text-white font-bold">0.0%</span></div>
                </div>
            </div>

            <!-- BOT STATS -->
            <div class="border border-border bg-offblack p-6 hover:border-dim transition-colors group">
                <h2
                    class="text-white text-xs font-bold mb-4 border-l-2 border-dim pl-2 uppercase tracking-widest group-hover:border-white transition-colors">
                    Bot Telemetry</h2>
                <div class="space-y-4 text-xs font-mono">
                    <div class="flex justify-between items-center"><span class="text-dim">UPTIME</span><span
                            id="bot-uptime" class="text-white font-bold">0s</span></div>
                    <div class="flex justify-between items-center"><span class="text-dim">PING</span><span id="bot-ping"
                            class="text-white font-bold">-- ms</span></div>
                    <div class="flex justify-between items-center"><span class="text-dim">MESSAGES</span><span
                            id="bot-msgs" class="text-white font-bold">0</span></div>
                </div>
            </div>

            <!-- PLUGIN ACTIONS -->
            <div class="border border-border bg-offblack p-6 hover:border-dim transition-colors group">
                <h2
                    class="text-white text-xs font-bold mb-4 border-l-2 border-dim pl-2 uppercase tracking-widest flex justify-between items-center group-hover:border-white transition-colors">
                    <span>Plugin DB</span>
                    <button onclick="fetchCorePlugins()"
                        class="text-dim hover:text-white transition cursor-pointer">[↻]</button>
                </h2>
                <div id="plugin-list"
                    class="h-24 overflow-y-auto space-y-2 text-xs pr-2 font-mono scrollbar-thin scrollbar-thumb-border scrollbar-track-black">
                    <span class="text-dim animate-pulse">Querying sys.modules...</span>
                </div>
            </div>
        </div>

        <!-- DYNAMIC WEBUI WIDGETS -->
        <h2 id="widgets-header"
            class="text-white text-xs font-bold mb-6 border-l-2 border-dim pl-2 uppercase tracking-widest hidden">
            Detected UI Extensions</h2>
        <div id="dashboard-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 mb-12">
            <!-- Widgets injected by script.js -->
        </div>

        <!-- LOGS -->
        <section
            class="max-w-7xl mx-auto border border-border bg-offblack p-6 group hover:border-dim transition-colors">
            <h2
                class="text-white text-xs font-bold mb-4 border-l-2 border-dim pl-2 uppercase tracking-widest flex justify-between items-center group-hover:border-white transition-colors">
                <span>Live Kernel Stream</span>
                <span class="text-dim text-[10px] animate-pulse">● REC</span>
            </h2>
            <div id="live-bot-logs"
                class="font-mono text-[10px] md:text-xs text-terminal bg-black border border-border p-4 h-64 overflow-y-auto whitespace-pre-wrap leading-relaxed tracking-tight scrollbar-thin scrollbar-thumb-dim scrollbar-track-black">
            </div>
        </section>

    </div>

    <script src="/static/script.js"></script>
</body>

</html>
